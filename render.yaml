services:
  - type: web
    name: eduflow
    runtime: php
    region: ohio
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader && npm ci && npm run build
    startCommand: php artisan optimize && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: EduFlow
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_LOCALE
        value: ar
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: eduflow-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr
      - key: MAIL_MAILER
        value: log
      - key: VITE_APP_NAME
        value: EduFlow

databases:
  - name: eduflow-db
    plan: free
    databaseName: eduflow
    user: eduflow
